exclude: .*\.patch

repos:
  ############################
  #  Built-in Common Checks  #
  ############################

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=1024
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
        # Golden snapshots must stay byte-equal with the live
        # toolchain output; Vitis `.rpt` files do not terminate with
        # a newline, so auto-appending one would turn every CI run
        # into fake drift.
        exclude: ^tapa-core/tests/golden/
      - id: file-contents-sorter
        files: (.gitignore|requirements.(txt|in))$
      - id: fix-byte-order-marker
      - id: forbid-new-submodules
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: pretty-format-json
        args:
          - --autofix
          - --indent=4
        exclude: ^tapa-core/tests/golden/
      - id: trailing-whitespace
        # Same rationale as end-of-file-fixer above.
        exclude: ^tapa-core/tests/golden/

  #####################
  #  Auto Formatting  #
  #####################

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.8
    hooks:
      - id: clang-format
        files: \.(c|cc|cpp|h|hpp)$

  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 8.2.0
    hooks:
      - id: buildifier
      - id: buildifier-lint

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.4
    hooks:
      - id: ruff
        args: [ --fix, --unsafe-fixes ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path fpga-runtime/Cargo.toml --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path fpga-runtime/Cargo.toml --all-targets
        language: system
        types: [rust]
        pass_filenames: false

  #############
  #  Linting  #
  #############

  - repo: local
    hooks:
      - id: file-budget
        name: file budget
        entry: python3 tools/quality/file_budget.py --mode staged
        language: system
        pass_filenames: false
        files: ^(tapa/.*\.py|tapa-visualizer/src/.*\.(js|mjs|cjs))$
      - id: lint-budget
        name: lint budget (ruff regression)
        entry: python3 tools/quality/lint_budget.py --mode staged
        language: system
        pass_filenames: false
        files: ^tapa/.*\.py$

      # Retirement guards. The legacy PyO3 `tapa_core`
      # extension and the `TAPA_USE_RUST_*` flag-parity flow were
      # removed; these hooks fail any new commit that re-introduces a
      # runtime reference under `tapa/`. They run on every commit and
      # do not depend on which files were staged.
      - id: forbid-tapa-core-runtime-ref
        name: forbid `tapa_core` references under tapa/
        entry: bash -c '! grep -r --include="*.py" --include="BUILD.bazel" tapa_core tapa/'
        language: system
        pass_filenames: false
        always_run: true

      - id: forbid-tapa-use-rust-runtime-ref
        name: forbid `TAPA_USE_RUST_` references under tapa/
        entry: bash -c '! grep -r --include="*.py" --include="BUILD.bazel" --include="*.sh" TAPA_USE_RUST_ tapa/'
        language: system
        pass_filenames: false
        always_run: true

      - id: forbid-retired-python-cli-paths
        name: forbid retired Python CLI paths (tapa/__main__.py, tapa/steps/*)
        entry: bash -c '! { [ -e tapa/__main__.py ] || [ -d tapa/steps ]; }'
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.1"
    hooks:
      - id: codespell
        types_or: [asciidoc, python, markdown, rst]
        additional_dependencies: [tomli]

  ###################
  #  Type Checking  #
  ###################

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.403
    hooks:
      - id: pyright
        # reading deps from file is not supported to ensure caching correctness
        additional_dependencies:
          - click
          - coloredlogs
          - intervaltree
          - jinja2
          - networkx
          - nuitka
          - packaging
          - psutil
          - pydantic
          - pyslang==8.1.0  # specific version needed for pyslang stub
          - pytest
          - pyverilog
          - pyyaml
          - tree-sitter
          - tree-sitter-cpp

  ##################
  #  Link Checks  #
  ##################

  - repo: https://github.com/google/pre-commit-tool-hooks
    rev: v1.2.5
    hooks:
      - id: check-links
