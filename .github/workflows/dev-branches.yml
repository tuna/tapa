name: Development Branches

on:
  push:
    branches-ignore:
      - main
      - release
      - release/*

permissions:
  actions: write
  contents: write

jobs:
  pre-commit:
    name: Pre-Commit
    runs-on: self-hosted

    steps:
      - name: Checkout myself
        id: checkout_primary
        continue-on-error: true
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1

      - name: Retry checkout myself
        id: checkout_retry
        if: steps.checkout_primary.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1

      - name: Verify checkout
        run: |
          set -euo pipefail
          test -d .git
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
        shell: bash

      - name: Run pre-commit
        uses: ./.github/actions/run-command
        with:
          run: pre-commit run --all-files
        env:
          UBUNTU_PRO_TOKEN: ${{ secrets.UBUNTU_PRO_TOKEN }}
          MAC_ADDRESS: ${{ secrets.MAC_ADDRESS }}

  test:
    name: Bazel Test
    runs-on: self-hosted

    steps:
      - name: Checkout myself
        id: checkout_primary
        continue-on-error: true
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1

      - name: Retry checkout myself
        id: checkout_retry
        if: steps.checkout_primary.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1

      - name: Verify checkout
        run: |
          set -euo pipefail
          test -d .git
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
        shell: bash

      - name: Run bazel
        uses: ./.github/actions/run-command
        with:
          run: bazel test --jobs=1 --local_test_jobs=1 --test_output=errors //... -//tests/functional/parallel-emulation:cannon-xosim
        env:
          UBUNTU_PRO_TOKEN: ${{ secrets.UBUNTU_PRO_TOKEN }}
          MAC_ADDRESS: ${{ secrets.MAC_ADDRESS }}

  test-cannon:
    name: Bazel Test Cannon
    runs-on: self-hosted

    steps:
      - name: Checkout myself
        id: checkout_primary
        continue-on-error: true
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1

      - name: Retry checkout myself
        id: checkout_retry
        if: steps.checkout_primary.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1

      - name: Verify checkout
        run: |
          set -euo pipefail
          test -d .git
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
        shell: bash

      - name: Run bazel
        uses: ./.github/actions/run-command
        with:
          run: bazel test --jobs=1 --local_test_jobs=1 --test_output=errors //tests/functional/parallel-emulation:cannon-xosim
        env:
          UBUNTU_PRO_TOKEN: ${{ secrets.UBUNTU_PRO_TOKEN }}
          MAC_ADDRESS: ${{ secrets.MAC_ADDRESS }}

  lint-js:
    name: Lint JS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout myself
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Run JS lint
        run: |
          pnpm --dir tapa-visualizer install --frozen-lockfile
          pnpm --dir tapa-visualizer lint src

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout myself
        uses: actions/checkout@v4

      - name: Build docs
        run: bazel build //docs:build

  quality-baseline:
    name: Quality Baseline Staleness Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout myself
        uses: actions/checkout@v4

      - name: Verify allowlist baseline is up to date
        run: |
          python3 tools/quality/file_budget.py \
            --write-baseline tools/quality/file_budget_baseline.json
          git diff --exit-code tools/quality/file_budget_baseline.json

  all-required-branch-checks:
    name: All Required Branch Checks
    runs-on: ubuntu-latest
    if: ${{ always() }}

    needs:
      - pre-commit
      - test
      - test-cannon
      - lint-js
      - docs
      - quality-baseline

    steps:
      - name: Checkout myself
        uses: actions/checkout@v4

      - name: Check if all required jobs are green
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  auto-merge-if-checks-pass:
    name: Auto-Merge Branch if Checks Pass
    runs-on: ubuntu-latest

    needs:
      - all-required-branch-checks

    if: >
      !github.event.act &&
      startsWith(github.ref, 'refs/heads/') &&
      endsWith(github.ref, '/next') &&
      needs.All-Required-Branch-Checks.result == 'success'

    steps:
      - name: Checkout myself
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PUSH_PAT }}

      - name: Try to merge into main
        id: merge
        run: >
          git checkout main &&
          git merge --ff-only ${{ github.ref_name }} &&
          git push &&
          echo "is-successful=true" >>"${GITHUB_OUTPUT}" ||
          echo "is-successful=false" >>"${GITHUB_OUTPUT}"
        shell: bash

      - name: Trigger staging build
        uses: benc-uk/workflow-dispatch@v1
        if: ${{ steps.merge.outputs.is-successful == 'true' }}
        with:
          workflow: Staging Build
          ref: refs/heads/main
